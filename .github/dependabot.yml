version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/backend"
    exclude-paths:
      - "vendor/**"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
